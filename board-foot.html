<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Board Foot Calculator — ScottyTools</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="page">
    <div class="tool-page">
      <div class="tool-header fade-up">
        <div class="tool-breadcrumb">
          <a href="../index.html">ScottyTools</a>
          <span>/</span>
          <span data-cat="carpentry">Finish Carpentry</span>
        </div>
        <h1 class="tool-title">Board Foot Calculator</h1>
        <p class="tool-description">Calculate board feet from board dimensions. Add multiple pieces to get a total. A board foot = 1 ft × 1 ft × 1 in.</p>
      </div>

      <!-- Entry form -->
      <div class="fade-up-2">
        <div class="field-row">
          <div class="field">
            <label>Thickness</label>
            <div style="display:flex;gap:6px">
              <input type="number" id="thick" placeholder="1" min="0" step="0.125" style="flex:1"/>
              <select id="thickUnit" style="width:70px">
                <option value="in">in</option>
                <option value="ft">ft</option>
                <option value="mm">mm</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Width</label>
            <div style="display:flex;gap:6px">
              <input type="number" id="width" placeholder="6" min="0" step="0.125" style="flex:1"/>
              <select id="widthUnit" style="width:70px">
                <option value="in">in</option>
                <option value="ft">ft</option>
                <option value="mm">mm</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Length</label>
            <div style="display:flex;gap:6px">
              <input type="number" id="length" placeholder="96" min="0" step="0.5" style="flex:1"/>
              <select id="lengthUnit" style="width:70px">
                <option value="in">in</option>
                <option value="ft">ft</option>
                <option value="mm">mm</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Quantity</label>
            <input type="number" id="qty" value="1" min="1" step="1"/>
          </div>
        </div>

        <div style="display:flex;gap:10px;align-items:center;margin-top:4px">
          <button class="btn btn-primary" onclick="addPiece()">+ Add Piece</button>
          <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
        </div>
      </div>

      <!-- Piece list -->
      <div id="pieceListWrap" class="hidden mt-3">
        <div class="section-header">
          <span class="section-title">Pieces</span>
          <span class="section-count" id="pieceCount"></span>
        </div>
        <div id="pieceList" style="display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px;"></div>
      </div>

      <!-- Result -->
      <div class="result-panel mt-2" id="resultPanel">
        <div class="result-label">Total Board Feet</div>
        <div>
          <span class="result-value" id="totalBF">—</span>
          <span class="result-unit">bf</span>
        </div>
        <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:16px" id="extraStats"></div>
      </div>

      <!-- Reference -->
      <div class="result-panel mt-2" style="margin-top:16px">
        <div class="result-label">Common Lumber Reference</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:10px" id="lumberRef"></div>
      </div>
    </div>
  </main>

  <script src="../js/tools-registry.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    Nav.init();

    const pieces = [];

    const LUMBER = [
      { nominal: '1×2',  actual: [0.75, 1.5]  },
      { nominal: '1×4',  actual: [0.75, 3.5]  },
      { nominal: '1×6',  actual: [0.75, 5.5]  },
      { nominal: '1×8',  actual: [0.75, 7.25] },
      { nominal: '1×10', actual: [0.75, 9.25] },
      { nominal: '1×12', actual: [0.75, 11.25]},
      { nominal: '2×4',  actual: [1.5,  3.5]  },
      { nominal: '2×6',  actual: [1.5,  5.5]  },
      { nominal: '2×8',  actual: [1.5,  7.25] },
      { nominal: '2×10', actual: [1.5,  9.25] },
      { nominal: '2×12', actual: [1.5,  11.25]},
      { nominal: '4×4',  actual: [3.5,  3.5]  },
    ];

    // Populate reference table
    document.getElementById('lumberRef').innerHTML = LUMBER.map(l =>
      `<div style="background:var(--bg-3);padding:8px 10px;border-radius:var(--radius);font-family:var(--mono);font-size:0.75rem">
        <span style="color:var(--accent)">${l.nominal}</span>
        <span style="color:var(--text-dim);margin-left:6px">${l.actual[0]}" × ${l.actual[1]}"</span>
      </div>`
    ).join('');

    function toInches(val, unit) {
      if (unit === 'ft') return val * 12;
      if (unit === 'mm') return val / 25.4;
      return val;
    }

    function calcBF(tIn, wIn, lIn, qty) {
      return (tIn * wIn * lIn * qty) / 144;
    }

    function addPiece() {
      const thick  = parseFloat(document.getElementById('thick').value);
      const width  = parseFloat(document.getElementById('width').value);
      const length = parseFloat(document.getElementById('length').value);
      const qty    = parseInt(document.getElementById('qty').value) || 1;
      const tu = document.getElementById('thickUnit').value;
      const wu = document.getElementById('widthUnit').value;
      const lu = document.getElementById('lengthUnit').value;

      if (!thick || !width || !length) return alert('Enter all three dimensions.');

      const tIn = toInches(thick, tu);
      const wIn = toInches(width, wu);
      const lIn = toInches(length, lu);
      const bf  = calcBF(tIn, wIn, lIn, qty);

      pieces.push({ thick, tu, width, wu, length, lu, qty, tIn, wIn, lIn, bf });
      renderPieces();
    }

    function removePiece(i) { pieces.splice(i, 1); renderPieces(); }

    function renderPieces() {
      const wrap = document.getElementById('pieceListWrap');
      const list = document.getElementById('pieceList');

      if (!pieces.length) {
        wrap.classList.add('hidden');
        document.getElementById('totalBF').textContent = '—';
        document.getElementById('extraStats').innerHTML = '';
        return;
      }

      wrap.classList.remove('hidden');
      document.getElementById('pieceCount').textContent = `${pieces.length} piece${pieces.length!==1?'s':''}`;

      list.innerHTML = pieces.map((p, i) => `
        <div style="background:var(--bg-1);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px">
          <div style="font-family:var(--mono);font-size:0.8rem">
            <span>${p.thick}${p.tu} × ${p.width}${p.wu} × ${p.length}${p.lu}</span>
            ${p.qty > 1 ? `<span style="color:var(--text-dim)"> × ${p.qty}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-family:var(--mono);color:var(--accent)">${p.bf.toFixed(3)} bf</span>
            <button onclick="removePiece(${i})" style="background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:1rem" title="Remove">✕</button>
          </div>
        </div>`).join('');

      const total = pieces.reduce((s, p) => s + p.bf, 0);
      document.getElementById('totalBF').textContent = total.toFixed(3);

      // Waste factor estimates
      const waste10 = total * 1.10;
      const waste15 = total * 1.15;
      document.getElementById('extraStats').innerHTML = `
        <div style="font-family:var(--mono);font-size:0.75rem">
          <div style="color:var(--text-faint);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px">+10% waste</div>
          <div>${waste10.toFixed(2)} bf</div>
        </div>
        <div style="font-family:var(--mono);font-size:0.75rem">
          <div style="color:var(--text-faint);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px">+15% waste</div>
          <div>${waste15.toFixed(2)} bf</div>
        </div>`;
    }

    function clearAll() { pieces.length = 0; renderPieces(); }
  </script>
</body>
</html>
