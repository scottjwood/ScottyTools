[build]
  publish = "."

# Edge function — secure proxy for Ledger API calls
# SCRIPT_URL and API_TOKEN are read server-side; never sent to browser
[[edge_functions]]
  path     = "/.netlify/edge-functions/ledger-api"
  function = "ledger-api"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"