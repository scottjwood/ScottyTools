[build]
  command = "bash build.sh"
  publish = "dist"

# Serve tool pages cleanly
[[redirects]]
  from = "/tools/:page"
  to   = "/tools/:page.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Never cache ledger — secrets are baked in at build time
[[headers]]
  for = "/tools/ledger.html"
  [headers.values]
    Cache-Control = "no-store"
