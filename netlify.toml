[build]
  command = "bash build.sh"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "dist/js/auth.js"

[[edge_functions]]
  path     = "/.netlify/edge-functions/ledger-api"
  function = "ledger-api"

[[edge_functions]]
  path     = "/.netlify/edge-functions/auth-callback"
  function = "auth-callback"

[[edge_functions]]
  path     = "/.netlify/edge-functions/auth-token"
  function = "auth-token"

[[edge_functions]]
  path     = "/.netlify/edge-functions/auth-signout"
  function = "auth-signout"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/tools/ledger.html"
  [headers.values]
    Cache-Control = "no-store"