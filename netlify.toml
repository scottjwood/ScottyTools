[build]
  command = "bash build.sh"
  publish = "dist"

# ── Local development ─────────────────────────────────────────────────────────
# `netlify dev` loads env vars from the linked Netlify site, then runs
# dev-serve.sh which: (1) calls build.sh so %%placeholders%% get replaced,
# then (2) starts a static server on port 3000 that netlify dev proxies.
# Edge functions are served automatically by netlify dev on the same port 8888.
[dev]
  command    = "bash dev-serve.sh"
  targetPort = 3000
  port       = 8888
  autoLaunch = false

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "dist/js/auth.js"

[[edge_functions]]
  path     = "/.netlify/edge-functions/ledger-api"
  function = "ledger-api"

[[edge_functions]]
  path     = "/.netlify/edge-functions/auth-callback"
  function = "auth-callback"

[[edge_functions]]
  path     = "/.netlify/edge-functions/auth-token"
  function = "auth-token"

[[edge_functions]]
  path     = "/.netlify/edge-functions/auth-signout"
  function = "auth-signout"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/tools/ledger.html"
  [headers.values]
    Cache-Control = "no-store"