<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png"/>
  <title>Password Generator — ScottyTools</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .tool-page { padding-top: var(--nav-h); min-height: 100vh; background: var(--bg); }
    .tool-container { max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }

    .tool-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); text-decoration: none; transition: color 150ms ease;
      margin-bottom: 16px;
    }
    .tool-back:hover { color: var(--accent); }
    .tool-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-1); line-height: 1; margin-bottom: 6px;
    }
    .tool-title span { color: var(--accent); }
    .tool-sub { font-size: 0.82rem; color: var(--text-3); margin-bottom: 28px; }

    /* ── Presets ───────────────────────────────────────────────── */
    .preset-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      margin-bottom: 16px;
    }
    .preset-btn {
      background: #131516; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-2);
      font-family: 'DM Mono', monospace; font-size: 0.78rem;
      padding: 10px 8px; cursor: pointer;
      transition: all 150ms ease; text-align: center;
    }
    .preset-btn:hover { border-color: var(--border-hi); color: var(--text-1); }
    .preset-btn.active {
      background: rgba(232,160,32,0.1);
      border-color: rgba(232,160,32,0.45);
      color: var(--accent);
    }
    .preset-name { display: block; font-weight: 600; margin-bottom: 2px; }
    .preset-desc { display: block; font-size: 0.65rem; color: inherit; opacity: 0.7; }

    /* ── Panel ─────────────────────────────────────────────────── */
    .panel {
      background: #131516; border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; margin-bottom: 16px;
    }
    .panel-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 0.65rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-3);
    }

    /* ── Length slider ─────────────────────────────────────────── */
    .length-row { display: flex; align-items: center; gap: 12px; }
    .length-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; background: #2a2e2e; border-radius: 2px;
      outline: none; cursor: pointer;
    }
    .length-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      transition: transform 150ms ease;
    }
    .length-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .length-val {
      font-family: 'DM Mono', monospace; font-size: 1rem;
      color: var(--text-1); min-width: 28px; text-align: right;
    }

    /* ── Checkboxes ────────────────────────────────────────────── */
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .check-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: #1a1c1e; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer;
      transition: border-color 150ms ease; user-select: none;
    }
    .check-row:hover { border-color: var(--border-hi); }
    .check-row.checked { border-color: rgba(232,160,32,0.35); }
    .check-box {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid var(--border); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: all 150ms ease;
    }
    .check-row.checked .check-box {
      background: var(--accent); border-color: var(--accent);
    }
    .check-box svg { display: none; }
    .check-row.checked .check-box svg { display: block; }
    .check-text { font-size: 0.75rem; color: var(--text-2); }
    .check-row.checked .check-text { color: var(--text-1); }
    .check-sample {
      margin-left: auto; font-family: 'DM Mono', monospace;
      font-size: 0.7rem; color: var(--text-3);
    }

    /* ── Toggle ────────────────────────────────────────────────── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .toggle-label { font-size: 0.75rem; color: var(--text-3); }
    .toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-switch input { display: none; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #2a2e2e; border-radius: 20px;
      cursor: pointer; transition: background 150ms ease;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--text-3); top: 3px; left: 3px;
      transition: all 150ms ease;
    }
    input:checked + .toggle-track { background: rgba(232,160,32,0.3); }
    input:checked + .toggle-track::after { background: var(--accent); left: 19px; }

    /* ── Output panel ──────────────────────────────────────────── */
    .output-panel {
      background: #0d0f10; border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; margin-bottom: 16px;
    }
    .pw-row {
      display: flex; align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 12px;
      transition: background 150ms ease;
    }
    .pw-row:last-of-type { border-bottom: none; }
    .pw-row:hover { background: rgba(255,255,255,0.02); }
    .pw-text {
      flex: 1; font-family: 'DM Mono', monospace;
      font-size: 0.88rem; color: var(--text-1);
      word-break: break-all; line-height: 1.5;
    }
    .pw-text.passphrase-mode { font-size: 0.85rem; }
    .copy-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-3);
      padding: 5px 8px; cursor: pointer;
      font-size: 0.7rem; font-family: 'DM Mono', monospace;
      transition: all 150ms ease; flex-shrink: 0;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #4caf50; color: #4caf50; }

    /* ── Strength bar ──────────────────────────────────────────── */
    .strength-wrap {
      padding: 12px 16px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 12px;
    }
    .strength-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); flex-shrink: 0; }
    .strength-track {
      flex: 1; height: 4px; background: #2a2e2e;
      border-radius: 2px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      transition: width 300ms ease, background 300ms ease;
    }
    .strength-text { font-size: 0.72rem; font-family: 'DM Mono', monospace; flex-shrink: 0; }

    /* ── Regen button ──────────────────────────────────────────── */
    .regen-btn {
      width: 100%;
      background: rgba(232,160,32,0.1); border: 1px solid rgba(232,160,32,0.3);
      border-radius: 8px; color: var(--accent);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 12px; cursor: pointer;
      transition: all 150ms ease;
    }
    .regen-btn:hover { background: rgba(232,160,32,0.18); border-color: rgba(232,160,32,0.5); }
    .regen-btn:active { transform: scale(0.98); }

    /* ── Passphrase hidden options ─────────────────────────────── */
    .options-hidden { display: none; }
    .options-hidden.visible { display: flex; }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="tool-page">
  <div class="tool-container">
    <a href="../index.html" class="tool-back">← ScottyTools</a>
    <div class="tool-title">Password <span>Generator</span></div>
    <div class="tool-sub">Generates passwords for common requirements.</div>

    <!-- Presets -->
    <div class="preset-grid">
      <button class="preset-btn active" onclick="applyPreset('standard', this)">
        <span class="preset-name">Standard</span>
        <span class="preset-desc">16 chars, all sets</span>
      </button>
      <button class="preset-btn" onclick="applyPreset('strong', this)">
        <span class="preset-name">Strong</span>
        <span class="preset-desc">24 chars, all sets</span>
      </button>
      <button class="preset-btn" onclick="applyPreset('passphrase', this)">
        <span class="preset-name">Passphrase</span>
        <span class="preset-desc">4 words + number</span>
      </button>
      <button class="preset-btn" onclick="applyPreset('nosymbols', this)">
        <span class="preset-name">No Symbols</span>
        <span class="preset-desc">16 chars, a–z A–Z 0–9</span>
      </button>
      <button class="preset-btn" onclick="applyPreset('wifi', this)">
        <span class="preset-name">WiFi</span>
        <span class="preset-desc">No ambiguous chars</span>
      </button>
      <button class="preset-btn" onclick="applyPreset('pin', this)">
        <span class="preset-name">PIN</span>
        <span class="preset-desc">6 digits</span>
      </button>
    </div>

    <!-- Options -->
    <div class="panel" id="optionsPanel">
      <div class="panel-body">

        <!-- Length -->
        <div class="field" id="lengthField">
          <div class="field-label">Length</div>
          <div class="length-row">
            <input type="range" class="length-slider" id="lengthSlider"
              min="4" max="64" value="16" oninput="onLengthChange(this.value)"/>
            <span class="length-val" id="lengthVal">16</span>
          </div>
        </div>

        <!-- Character sets -->
        <div class="field" id="charSetsField">
          <div class="field-label">Character Sets</div>
          <div class="checkbox-grid">
            <div class="check-row checked" id="chkUpper" onclick="toggleCheck('chkUpper')">
              <div class="check-box">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="check-text">Uppercase</span>
              <span class="check-sample">A–Z</span>
            </div>
            <div class="check-row checked" id="chkLower" onclick="toggleCheck('chkLower')">
              <div class="check-box">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="check-text">Lowercase</span>
              <span class="check-sample">a–z</span>
            </div>
            <div class="check-row checked" id="chkNumbers" onclick="toggleCheck('chkNumbers')">
              <div class="check-box">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="check-text">Numbers</span>
              <span class="check-sample">0–9</span>
            </div>
            <div class="check-row checked" id="chkSymbols" onclick="toggleCheck('chkSymbols')">
              <div class="check-box">
                <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <span class="check-text">Symbols</span>
              <span class="check-sample">!@#$</span>
            </div>
          </div>
        </div>

        <!-- Exclude ambiguous toggle -->
        <div class="toggle-row" id="ambiguousRow">
          <span class="toggle-label">Exclude ambiguous characters <span style="color:var(--text-3);font-family:'DM Mono',monospace;font-size:0.7rem">(0 O l 1 I)</span></span>
          <label class="toggle-switch">
            <input type="checkbox" id="excludeAmbiguous" onchange="generate()"/>
            <span class="toggle-track"></span>
          </label>
        </div>

      </div>
    </div>

    <!-- Generated passwords -->
    <div class="output-panel" id="outputPanel">
      <div id="pwList"></div>
      <div class="strength-wrap" id="strengthWrap">
        <span class="strength-label">Strength</span>
        <div class="strength-track">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="strength-text" id="strengthText"></span>
      </div>
    </div>

    <button class="regen-btn" onclick="generate()">↻ Regenerate</button>

  </div>
</div>

<script src="../js/tools-registry.js"></script>
<script src="../js/nav.js"></script>
<script>
Nav.init();

// ── Word list for passphrases ─────────────────────────────────────────────
const WORDS = [
  'apple','brave','cloud','delta','eagle','flame','gravel','haven','ivory','jungle',
  'kite','lemon','maple','north','ocean','pearl','quartz','river','storm','tiger',
  'urban','vault','water','xenon','yield','zebra','amber','brush','coral','drift',
  'ember','frost','glass','honey','indie','jazzy','kelp','lunar','mango','novel',
  'orbit','plaza','queen','rocky','solar','thorn','ultra','vivid','wheat','xeric',
  'yacht','zingy','alert','blaze','crisp','dawn','elder','fiber','glyph','hinge',
  'inlet','joust','knack','lodge','mocha','nexus','onset','prism','quest','renew',
  'spine','trout','unfold','viola','waltz','xylem','yodel','zonal','anvil','birch',
  'cedar','dome','epoch','forge','grove','hyper','index','jelly','karma','lapel',
  'mirth','niche','otter','pivot','quota','ridge','scout','twirl','umbra','venom',
  'woven','xenial','yucca','zesty','acorn','bluff','charm','disco','elope','focal',
  'grind','hatch','igloo','joker','knoll','ledge','micro','noble','optic','padlock',
  'quirk','rebel','shrub','tidal','unity','viper','wrath','xylene','young','zippy'
];

// ── State ─────────────────────────────────────────────────────────────────
let mode = 'standard'; // standard | strong | passphrase | nosymbols | wifi | pin

const PRESETS = {
  standard:   { length: 16, upper: true,  lower: true,  nums: true,  syms: true,  noambig: false },
  strong:     { length: 24, upper: true,  lower: true,  nums: true,  syms: true,  noambig: false },
  passphrase: { length: 4,  upper: false, lower: true,  nums: true,  syms: false, noambig: false },
  nosymbols:  { length: 16, upper: true,  lower: true,  nums: true,  syms: false, noambig: false },
  wifi:       { length: 16, upper: true,  lower: true,  nums: true,  syms: false, noambig: true  },
  pin:        { length: 6,  upper: false, lower: false,  nums: true,  syms: false, noambig: false },
};

function applyPreset(name, btn) {
  mode = name;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const p = PRESETS[name];
  const isPassphrase = name === 'passphrase';
  const isPin = name === 'pin';

  // Show/hide options
  document.getElementById('lengthField').style.display = (isPassphrase || isPin) ? 'none' : 'flex';
  document.getElementById('charSetsField').style.display = (isPassphrase || isPin) ? 'none' : 'flex';
  document.getElementById('ambiguousRow').style.display = (isPassphrase || isPin) ? 'none' : 'flex';

  if (!isPassphrase && !isPin) {
    setSlider(p.length);
    setCheck('chkUpper',   p.upper);
    setCheck('chkLower',   p.lower);
    setCheck('chkNumbers', p.nums);
    setCheck('chkSymbols', p.syms);
    document.getElementById('excludeAmbiguous').checked = p.noambig;
  }

  generate();
}

function setSlider(val) {
  document.getElementById('lengthSlider').value = val;
  document.getElementById('lengthVal').textContent = val;
}

function setCheck(id, state) {
  const el = document.getElementById(id);
  el.classList.toggle('checked', state);
}

function toggleCheck(id) {
  const el = document.getElementById(id);
  const nowChecked = !el.classList.contains('checked');
  // Ensure at least one checkbox stays on
  const others = ['chkUpper','chkLower','chkNumbers','chkSymbols'].filter(x => x !== id);
  const anyOtherChecked = others.some(x => document.getElementById(x).classList.contains('checked'));
  if (!nowChecked && !anyOtherChecked) return;
  el.classList.toggle('checked', nowChecked);
  generate();
}

function onLengthChange(val) {
  document.getElementById('lengthVal').textContent = val;
  generate();
}

// ── Crypto-random helpers ─────────────────────────────────────────────────
function randInt(n) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % n;
}

function pick(arr) { return arr[randInt(arr.length)]; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Generation ────────────────────────────────────────────────────────────
const CHARS = {
  upper:   'ABCDEFGHJKLMNPQRSTUVWXYZ',   // no I (ambig excluded variant handled separately)
  upperFull: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower:   'abcdefghjkmnpqrstuvwxyz',    // no l (ambig)
  lowerFull: 'abcdefghijklmnopqrstuvwxyz',
  nums:    '23456789',                   // no 0 1 (ambig)
  numsFull: '0123456789',
  syms:    '!@#$%^&*-_=+?',
};

function buildCharset(noAmbig) {
  const u = document.getElementById('chkUpper').classList.contains('checked');
  const l = document.getElementById('chkLower').classList.contains('checked');
  const n = document.getElementById('chkNumbers').classList.contains('checked');
  const s = document.getElementById('chkSymbols').classList.contains('checked');

  let pool = '';
  const sets = [];

  if (u) { const c = noAmbig ? CHARS.upper   : CHARS.upperFull;  pool += c; sets.push(c); }
  if (l) { const c = noAmbig ? CHARS.lower   : CHARS.lowerFull;  pool += c; sets.push(c); }
  if (n) { const c = noAmbig ? CHARS.nums    : CHARS.numsFull;   pool += c; sets.push(c); }
  if (s) { pool += CHARS.syms; sets.push(CHARS.syms); }

  return { pool, sets };
}

function genPassword() {
  const len = parseInt(document.getElementById('lengthSlider').value);
  const noAmbig = document.getElementById('excludeAmbiguous').checked;
  const { pool, sets } = buildCharset(noAmbig);
  if (!pool) return '—';

  // Guarantee at least one char from each active set
  const guaranteed = sets.map(s => pick([...s]));
  const rest = [];
  for (let i = guaranteed.length; i < len; i++) rest.push(pick([...pool]));

  return shuffle([...guaranteed, ...rest]).join('');
}

function genPassphrase() {
  const w = [pick(WORDS), pick(WORDS), pick(WORDS), pick(WORDS)];
  const n = randInt(900) + 100; // 100–999
  return w.join('-') + '-' + n;
}

function genPin() {
  let pin = '';
  for (let i = 0; i < 6; i++) pin += randInt(10);
  return pin;
}

function makePassword() {
  if (mode === 'passphrase') return genPassphrase();
  if (mode === 'pin') return genPin();
  return genPassword();
}

// ── Strength ──────────────────────────────────────────────────────────────
function calcStrength(pw) {
  if (mode === 'passphrase') return { pct: 90, label: 'Strong', color: '#4caf50' };
  if (mode === 'pin') return { pct: 20, label: 'Weak', color: '#f44336' };

  let score = 0;
  const len = pw.length;
  if (len >= 8)  score += 1;
  if (len >= 12) score += 1;
  if (len >= 16) score += 1;
  if (len >= 20) score += 1;
  if (/[A-Z]/.test(pw)) score += 1;
  if (/[a-z]/.test(pw)) score += 1;
  if (/[0-9]/.test(pw)) score += 1;
  if (/[^A-Za-z0-9]/.test(pw)) score += 2;

  const pct = Math.min(100, Math.round((score / 9) * 100));
  let label, color;
  if (pct >= 80) { label = 'Very Strong'; color = '#4caf50'; }
  else if (pct >= 60) { label = 'Strong';     color = '#8bc34a'; }
  else if (pct >= 40) { label = 'Moderate';   color = '#ff9800'; }
  else if (pct >= 20) { label = 'Weak';       color = '#ff5722'; }
  else               { label = 'Very Weak';  color = '#f44336'; }

  return { pct, label, color };
}

// ── Render ────────────────────────────────────────────────────────────────
let passwords = [];

function generate() {
  passwords = [];
  const count = (mode === 'pin') ? 8 : 5;
  for (let i = 0; i < count; i++) passwords.push(makePassword());
  render();
}

function render() {
  const list = document.getElementById('pwList');
  const isPassphrase = mode === 'passphrase';

  list.innerHTML = passwords.map((pw, i) => `
    <div class="pw-row">
      <span class="pw-text${isPassphrase ? ' passphrase-mode' : ''}" id="pw${i}">${escHtml(pw)}</span>
      <button class="copy-btn" id="cpbtn${i}" onclick="copyPw(${i})">Copy</button>
    </div>
  `).join('');

  // Strength based on first password
  const s = calcStrength(passwords[0]);
  document.getElementById('strengthFill').style.width  = s.pct + '%';
  document.getElementById('strengthFill').style.background = s.color;
  document.getElementById('strengthText').style.color = s.color;
  document.getElementById('strengthText').textContent = s.label;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function copyPw(i) {
  const btn = document.getElementById('cpbtn' + i);
  try {
    await navigator.clipboard.writeText(passwords[i]);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  } catch {
    // Fallback
    const el = document.getElementById('pw' + i);
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  }
}

// Initial generation
generate();
</script>
</body>
</html>
